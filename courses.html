<!DOCTYPE html>
<html lang="en">
<head>
<!--
  My Golf Scores — Courses
  courses.html

  MAJOR MILESTONES — full history in git log
  v1.6 — May 2026
  - Edit mode: breadcrumb dynamic (Courses: Add / Courses: Edit), title shows course name
  - goToLibrary() added for BACK navigation from basics screen
  v1.2 — May 2026
  - Migrated to 5-zone template: masthead · stageScrolls · navBar · footer
  - shared.js wired: NAV_LINKS, renderFooterNav(), showPanel()
  - CSS class names updated to canonical set
  v1.1 — May 2026
  - Course Library (screen-library): all courses A-Z, pencil to edit, Add Course button
  - Edit mode: pre-fills both screens, saves back to same ID
  - Red asterisk on empty CR/SR fields (advisory, non-blocking)
  v1.0 — May 2026
  - Built: name/holes/tee chips+CR+SR (screen 1) → hole-by-hole par/yds/SI (screen 2)
  - Saves to localStorage.courseCache (negative IDs for manually added courses)
-->
<meta name="theme-color" content="#377f09">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Golf Scores">
<link rel="manifest" href="manifest.json">
<title>Add Course</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="shared.js"></script>
<link rel="stylesheet" href="shared.css">
<style>
  /* ── COURSES-SPECIFIC ───────────────────────────────── */

  /* Tee detail form */
  .tee-detail {
    background: var(--green-pale); border-radius: 12px;
    padding: 12px; margin-bottom: 8px;
  }
  .tee-detail-name { font-size: 15px; font-weight: 600; color: var(--green); margin-bottom: 10px; }
  .cr-sr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .city-prov-grid { display: grid; grid-template-columns: 1fr 72px; gap: 10px; }
  .cr-sr-label {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 4px;
  }
  .cr-sr-input {
    width: 100%; background: var(--skin-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 10px;
    font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500;
    color: var(--text-primary); outline: none; transition: border-color 0.2s;
  }
  .cr-sr-input:focus { border-color: var(--green); }

  /* Hole data entry cards */
  .hole-card {
    background: var(--green-pale); border-radius: 12px;
    padding: 12px 12px 10px; margin: 0 20px 10px;
    scroll-margin-top: 8px;
  }
  /* #holes-tee-chips sits directly in stage-scrolls (no .form-section wrapper) —
     needs its own horizontal gutter to match the rest of Screen 2. */
  #holes-tee-chips { padding: 0 20px; }
  .hole-card-hdr {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 10px;
  }
  .hole-card-num {
    font-family: 'DM Mono', monospace;
    font-size: 17px; font-weight: 600; color: var(--green);
  }
  .hole-par-si {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 8px; margin-bottom: 8px;
  }
  .hole-field-lbl {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 3px;
  }
  .hole-input {
    width: 100%; background: var(--skin-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 4px;
    font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500;
    color: var(--text-primary); outline: none; text-align: center;
    transition: border-color 0.2s;
  }
  .hole-input:focus { border-color: var(--green); }
  .hole-input.par-filled { border-color: var(--green); }

  /* Course library list */
  .lib-item {
    display: flex; align-items: stretch; justify-content: space-between;
    border-bottom: 1px solid var(--border); background: var(--skin-bg);
  }
  .lib-item:first-child { border-radius: 12px 12px 0 0; }
  .lib-item:last-child  { border-radius: 0 0 12px 12px; border-bottom: none; }
  .lib-item:only-child  { border-radius: 12px; }
  .lib-info {
    flex: 1; min-width: 0; padding: 14px 12px 14px 16px;
    display: flex; flex-direction: column; gap: 3px; cursor: pointer;
  }
  .lib-info:active { background: var(--green-pale); }
  .lib-name {
    font-size: 19px; font-weight: 700; color: var(--green);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .lib-sub  { font-size: 12px; color: var(--text-secondary); }
  .lib-phone { margin-top: 4px; }
  .lib-phone a { color: var(--green); text-decoration: none; font-size: 15px; }
  .lib-actions {
    display: flex; flex-direction: row; align-items: center;
    justify-content: flex-end; gap: 8px; padding: 0 14px 0 10px; flex-shrink: 0;
  }
  .lib-edit {
    background: none; border: 1.5px solid var(--border); border-radius: 8px;
    width: 36px; height: 36px; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .lib-edit:active { background: var(--green-pale); }
  .lib-del {
    background: none; border: 1.5px solid #fca5a5; border-radius: 8px;
    width: 36px; height: 36px; font-size: 15px; cursor: pointer; color: #dc2626;
    display: flex; align-items: center; justify-content: center;
  }
  .lib-del:active { background: #fee2e2; }
  .lib-empty { color: var(--text-muted); font-size: 14px; padding: 20px 0; text-align: center; }
  .lib-add-wrap { display: flex; justify-content: center; padding: 16px 24px 8px; }
</style>
</head>
<body>

<!-- ══════════════════ SCREEN 0: LIBRARY ══════════════════ -->
<div class="screen active" id="screen-library">

  <div class="masthead">
    <div class="header-upper">
      <div class="hu-breadcrumb">Courses: Listings</div>
      <div class="hu-temp"></div>
      <div class="hu-date" id="lib-date"></div>
      <div class="hu-wind"></div>
    </div>
  </div>

  <div class="stage-scrolls">
    <div class="page-title">Courses</div>
    <div class="lib-list" id="lib-list"></div>
    <div class="lib-add-wrap"><button class="btn-3d" onclick="startAddCourse()">ADD COURSE</button></div>
  </div>

  <div class="nav-bar">
  </div>
  <div class="footer" data-nav></div>

</div>

<!-- ══════════════════ SCREEN 1: BASICS ══════════════════ -->
<div class="screen" id="screen-basics">

  <div class="masthead">
    <div class="header-upper">
      <div class="hu-breadcrumb">Courses: Add</div>
      <div class="hu-temp"></div>
      <div class="hu-date" id="basics-date"></div>
      <div class="hu-wind"></div>
    </div>
  </div>

  <div class="stage-scrolls" id="basics-stage">
    <div class="page-title"><span id="basics-title">Add Course</span><div class="edit-badge" id="edit-badge"></div></div>

    <!-- Course Name -->
    <div class="form-section">
      <label class="field-label" for="course-name">Course Name</label>
      <input type="text" id="course-name" class="field-input"
             placeholder="e.g. Kamloops G&amp;CC"
             maxlength="60" autocorrect="off" autocomplete="off" spellcheck="false">
    </div>

    <!-- Phone -->
    <div class="form-section">
      <label class="field-label" for="course-phone">Phone <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-muted)">(optional)</span></label>
      <input type="text" id="course-phone" class="field-input"
             placeholder="e.g. 250-573-2453"
             autocorrect="off" autocomplete="off" spellcheck="false"
             onblur="this.value=formatPhone(this.value)">
    </div>

    <!-- Street Address -->
    <div class="form-section">
      <label class="field-label" for="course-street">Street Address <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-muted)">(optional)</span></label>
      <input type="text" id="course-street" class="field-input"
             placeholder="e.g. 4211 Gladwin Road"
             autocorrect="off" autocomplete="off" spellcheck="false"
             oninput="this.value=toAddrCase(this.value)">
    </div>

    <!-- City / Province -->
    <div class="form-section">
      <label class="field-label">City &amp; Province <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-muted)">(optional)</span></label>
      <div class="city-prov-grid">
        <input type="text" id="course-city" class="field-input"
               placeholder="Kamloops"
               autocorrect="off" autocomplete="off" spellcheck="false"
               oninput="this.value=toAddrCase(this.value)">
        <input type="text" id="course-province" class="field-input"
               placeholder="BC" maxlength="2"
               autocorrect="off" autocomplete="off" spellcheck="false"
               oninput="this.value=this.value.toUpperCase()">
      </div>
    </div>

    <!-- Holes -->
    <div class="form-section">
      <label class="field-label">Holes</label>
      <div class="seg-control">
        <button class="seg-btn" id="seg-9"  onclick="setHoles(9)">9</button>
        <button class="seg-btn active" id="seg-18" onclick="setHoles(18)">18</button>
      </div>
    </div>

    <!-- Tees -->
    <div class="form-section">
      <label class="field-label">Tees</label>
      <div class="tee-chip-strip" id="tee-chips"></div>
      <div id="tee-details"></div>
    </div>


  </div><!-- /stage -->

  <div class="nav-bar">
    <button class="btn-3d" onclick="goToLibrary()">BACK</button>
    <button class="btn-3d" onclick="goToHoles()">NEXT</button>
  </div>
  <div class="footer" data-nav></div>

</div>


<!-- ══════════════════ SCREEN 2: HOLES ══════════════════ -->
<div class="screen" id="screen-holes">

  <div class="masthead">
    <div class="header-upper">
      <div class="hu-breadcrumb" id="holes-course-label">Courses: Hole Data</div>
      <div class="hu-temp"></div>
      <div class="hu-date" id="holes-date"></div>
      <div class="hu-wind"></div>
    </div>
  </div>

  <div class="stage-scrolls" id="holes-stage">
    <div class="page-title">Hole Data</div>
    <div class="tee-chip-strip" id="holes-tee-chips"></div>
    <div class="nav-dots" id="hole-dots"></div>
    <div id="hole-cards"></div>
  </div>

  <div class="nav-bar">
    <button class="btn-3d" onclick="goToBasics()">BACK</button>
    <button class="btn-3d" onclick="saveCourse()">SAVE COURSE</button>
  </div>
  <div class="footer" data-nav></div>

</div>


<script>
'use strict';

// ── Constants ──────────────────────────────────────────
const TEE_ORDER = ['White', 'Gold', 'Blue', 'Red'];

// ── State ──────────────────────────────────────────────
let numHoles = 18;

// teesState: [{name, cr, sr}]
// All 4 tees always exist. selectedTeeScreen1 controls which one is shown/edited.
let teesState = TEE_ORDER.map(name => ({
  name,
  cr: '',
  sr: ''
}));

// selectedTeeScreen1 — radio-button selection on Screen 1 (one tee at a time)
let selectedTeeScreen1 = 'Blue';

// holeState — persists par/SI/yardages across Screen 1 ↔ Screen 2 navigation
// keyed by hole number: { 1: { par:'4', si:'7', yds:{ White:'380', Red:'310' } }, ... }
let holeState = {};

// activeTeeScreen2 — which tee is currently selected on Screen 2 (radio button)
let activeTeeScreen2 = null;

// ── Utility ────────────────────────────────────────────
// ── Phone formatter ────────────────────────────────────
function formatPhone(raw) {
  const digits = raw.replace(/\D/g, '');
  if (digits.length === 10)
    return digits.replace(/(\d{3})(\d{3})(\d{4})/, '$1-$2-$3');
  if (digits.length === 11 && digits[0] === '1')
    return digits.replace(/(\d)(\d{3})(\d{3})(\d{4})/, '$1-$2-$3-$4');
  return raw; // leave as-is if unrecognised format
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getCache() {
  try { return JSON.parse(localStorage.getItem('courseCache') || '{}'); } catch(e) { return {}; }
}

function saveToCache(course) {
  const c = getCache();
  c[String(course.id)] = { ...course, cachedAt: new Date().toISOString().split('T')[0] };
  localStorage.setItem('courseCache', JSON.stringify(c));
}

function removeFromCache(id) {
  const c = getCache();
  delete c[String(id)];
  localStorage.setItem('courseCache', JSON.stringify(c));
}

// Add mode: all 4 standard tee slots (new course, no data yet).
// Edit mode: only tees that actually have saved data — no phantom empty chips.
function activeTees() {
  return editingId === null ? teesState : teesWithData();
}

// Returns tees that actually have data (CR, SR, or any yardage) — used for save.
function teesWithData() {
  return teesState.filter(t => {
    if (t.cr || t.sr) return true;
    for (let h = 1; h <= numHoles; h++) {
      const hs = holeState[h];
      if (hs && hs.yds && hs.yds[t.name]) return true;
    }
    return false;
  });
}

// ── Holes toggle ───────────────────────────────────────
function setHoles(n) {
  numHoles = n;
  document.getElementById('seg-9') .classList.toggle('active', n === 9);
  document.getElementById('seg-18').classList.toggle('active', n === 18);
}

// ── Screen 1 tee management (radio button: one tee selected at a time) ──
function selectTee(name) {
  syncTeeInputsToState();          // flush current form data before switching
  selectedTeeScreen1 = name;
  renderTeeChips();
  renderTeeDetails();
}

// Re-renders Screen 1 chip strip from activeTees() — phantom slots never appear.
function renderTeeChips() {
  const el = document.getElementById('tee-chips');
  if (!el) return;
  el.innerHTML = activeTees().map(t =>
    `<button class="tee-chip${t.name === selectedTeeScreen1 ? ' active' : ''}"
             onclick="selectTee('${esc(t.name)}')">${esc(t.name)}</button>`
  ).join('');
}

function syncTeeInputsToState() {
  // Only flush the currently visible tee's inputs into state
  const t = teesState.find(t => t.name === selectedTeeScreen1);
  if (!t) return;
  const crEl = document.getElementById('cr-' + t.name);
  const srEl = document.getElementById('sr-' + t.name);
  if (crEl) t.cr = crEl.value;
  if (srEl) t.sr = srEl.value;
}

function renderTeeDetails() {
  const container = document.getElementById('tee-details');
  const t = teesState.find(x => x.name === selectedTeeScreen1);
  if (!t) { container.innerHTML = ''; return; }
  container.innerHTML = `
    <div class="tee-detail" id="tee-detail-${t.name}">
      <div class="tee-detail-name">${esc(t.name)} Tees</div>
      <div class="cr-sr-grid">
        <div>
          <div class="cr-sr-label" id="lbl-cr-${t.name}">Course Rating (CR)</div>
          <input type="number" class="cr-sr-input" id="cr-${t.name}"
                 placeholder="59.0" step="0.1" min="40" max="82"
                 inputmode="decimal" value="${esc(t.cr)}"
                 oninput="teesState.find(x=>x.name==='${t.name}').cr=this.value">
        </div>
        <div>
          <div class="cr-sr-label" id="lbl-sr-${t.name}">Slope Rating (SR)</div>
          <input type="number" class="cr-sr-input" id="sr-${t.name}"
                 placeholder="86" step="1" min="55" max="155"
                 inputmode="numeric" value="${esc(t.sr)}"
                 oninput="teesState.find(x=>x.name==='${t.name}').sr=this.value">
        </div>
      </div>
    </div>`;
}

// ── Screen 2 tee radio-button (one tee active at a time for hole data entry) ──

// Returns active tees sorted longest → shortest by holeState yardage totals.
// Falls back to TEE_ORDER with Red always last when no yardages yet.
function sortedActiveTeesForScreen2() {
  const active = activeTees();
  return [...active].sort((a, b) => {
    const yA = getTeeYardageTotal(a.name);
    const yB = getTeeYardageTotal(b.name);
    if (yA > 0 || yB > 0) return yB - yA;
    // No yardages yet: Red always last, else by TEE_ORDER
    if (a.name === 'Red') return 1;
    if (b.name === 'Red') return -1;
    return TEE_ORDER.indexOf(a.name) - TEE_ORDER.indexOf(b.name);
  });
}

function getTeeYardageTotal(teeName) {
  let total = 0;
  for (let h = 1; h <= numHoles; h++) {
    const hs = holeState[h];
    total += parseInt((hs && hs.yds && hs.yds[teeName]) || '') || 0;
  }
  return total;
}

// Renders tee chips on Screen 2 (radio button — one active at a time).
// Hidden when only one tee.
function renderHoleTeePicker() {
  const el = document.getElementById('holes-tee-chips');
  if (!el) return;
  const sorted = sortedActiveTeesForScreen2();
  if (sorted.length <= 1) { el.innerHTML = ''; return; }
  el.innerHTML = sorted.map(t =>
    `<button class="tee-chip${t.name === activeTeeScreen2 ? ' active' : ''}"
             onclick="switchTeeOnScreen2('${esc(t.name)}')">${esc(t.name)}</button>`
  ).join('');
}

// Switches the active tee on Screen 2, flushing current yardages first.
function switchTeeOnScreen2(teeName) {
  if (teeName === activeTeeScreen2) return;
  saveYardagesToState();
  activeTeeScreen2 = teeName;
  renderHoleTeePicker();
  updateYardageInputs();
}

// Flushes the visible yardage inputs into holeState for the current tee.
function saveYardagesToState() {
  if (!activeTeeScreen2) return;
  for (let h = 1; h <= numHoles; h++) {
    const yEl = document.getElementById('h' + h + '-yds');
    if (!yEl) continue;
    if (!holeState[h]) holeState[h] = { par: '', si: '', yds: {} };
    if (!holeState[h].yds) holeState[h].yds = {};
    holeState[h].yds[activeTeeScreen2] = yEl.value;
  }
}

// Updates the single yardage column to show values for activeTeeScreen2.
function updateYardageInputs() {
  for (let h = 1; h <= numHoles; h++) {
    const yEl  = document.getElementById('h' + h + '-yds');
    const lblEl = document.getElementById('h' + h + '-yds-lbl');
    if (!yEl) continue;
    const hs  = holeState[h];
    const val = (hs && hs.yds && hs.yds[activeTeeScreen2]) || '';
    yEl.value = val;
    if (lblEl) lblEl.textContent = (activeTeeScreen2 || '') + ' yds';
  }
  updateDots();
}

// ── Hole state persistence ──────────────────────────────
// Saves par/SI from DOM into holeState (yardages kept current via saveYardagesToState).
function saveParSiToState() {
  for (let h = 1; h <= numHoles; h++) {
    const parEl = document.getElementById('h' + h + '-par');
    if (!parEl) continue;
    if (!holeState[h]) holeState[h] = { par: '', si: '', yds: {} };
    holeState[h].par = parEl.value;
    const siEl = document.getElementById('h' + h + '-si');
    if (siEl) holeState[h].si = siEl.value;
  }
}

// Restores par/SI from holeState after re-render, then loads active tee yardages.
function prefillHoleCardsFromState() {
  let any = false;
  for (let h = 1; h <= numHoles; h++) {
    const data = holeState[h];
    if (!data) continue;
    any = true;
    const parEl = document.getElementById('h' + h + '-par');
    const siEl  = document.getElementById('h' + h + '-si');
    if (parEl && data.par) { parEl.value = data.par; onParChange(h, data.par); }
    if (siEl  && data.si)  siEl.value = data.si;
  }
  updateYardageInputs(); // load current tee's yardages into the single column
  if (any) updateDots();
}

// Saves a single hole's par/SI + active tee yardage on every input event.
function saveHole(h) {
  if (!holeState[h]) holeState[h] = { par: '', si: '', yds: {} };
  if (!holeState[h].yds) holeState[h].yds = {};
  const parEl = document.getElementById('h' + h + '-par');
  const siEl  = document.getElementById('h' + h + '-si');
  const yEl   = document.getElementById('h' + h + '-yds');
  if (parEl) holeState[h].par = parEl.value;
  if (siEl)  holeState[h].si  = siEl.value;
  if (yEl && activeTeeScreen2) holeState[h].yds[activeTeeScreen2] = yEl.value;
}

// ── Navigation ─────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function goHome() {
  window.location.href = 'index.html';
}

function goToLibrary() {
  showScreen('library');
}

function goToBasics() {
  saveYardagesToState();  // flush current tee's yardages before leaving Screen 2
  saveParSiToState();     // flush par/SI
  syncTeeInputsToState(); // flush CR/SR
  showScreen('basics');
}

function goToHoles() {
  syncTeeInputsToState();
  const name = document.getElementById('course-name').value.trim();
  if (!name) {
    alert('Please enter a course name.');
    document.getElementById('course-name').focus();
    return;
  }
  // Start Screen 2 on whichever tee was selected on Screen 1
  activeTeeScreen2 = selectedTeeScreen1;

  document.getElementById('holes-course-label').textContent = 'Courses: ' + name;
  renderHoleCards();        // builds DOM, then calls prefillHoleCardsFromState()
  renderHoleTeePicker();    // renders tee chips (hidden if only one tee)

  // Edit mode: prefill from cache on first visit (holeState empty)
  if (editingId !== null && Object.keys(holeState).length === 0) {
    const course = getCache()[editingId];
    if (course) setTimeout(() => { prefillHoleCards(course); renderHoleTeePicker(); }, 0);
  }
  showScreen('holes');
  document.getElementById('holes-stage').scrollTop = 0;
}

// ── Hole Cards (Screen 2) ──────────────────────────────
function renderHoleCards() {
  const active = activeTees();
  const dotsEl = document.getElementById('hole-dots');
  const cardsEl = document.getElementById('hole-cards');

  // Progress dots
  dotsEl.innerHTML = Array.from({length: numHoles}, (_, i) =>
    `<div class="dot" id="dot-${i+1}" onclick="scrollToHole(${i+1})"></div>`
  ).join('');

  cardsEl.innerHTML = Array.from({length: numHoles}, (_, i) => {
    const h = i + 1;
    return `
      <div class="hole-card" id="hcard-${h}">
        <div class="hole-card-hdr">
          <span class="hole-card-num">Hole ${h}</span>
        </div>
        <div class="hole-par-si">
          <div>
            <div class="hole-field-lbl">Par</div>
            <input type="number" class="hole-input" id="h${h}-par"
                   placeholder="—" min="3" max="6" inputmode="numeric"
                   oninput="onParChange(${h}, this.value); saveHole(${h});">
          </div>
          <div>
            <div class="hole-field-lbl">SI</div>
            <input type="number" class="hole-input" id="h${h}-si"
                   placeholder="—" min="1" max="${numHoles}" inputmode="numeric"
                   oninput="updateDots(); saveHole(${h});">
          </div>
          <div>
            <div class="hole-field-lbl" id="h${h}-yds-lbl">${esc(activeTeeScreen2 || '')} yds</div>
            <input type="number" class="hole-input" id="h${h}-yds"
                   placeholder="—" min="0" max="800" inputmode="numeric"
                   oninput="updateDots(); saveHole(${h});">
          </div>
        </div>
      </div>`;
  }).join('');

  updateDots();
  prefillHoleCardsFromState(); // restore any previously entered data
}

function onParChange(hole, val) {
  const p = parseInt(val);
  updateDots();
}

function updateDots() {
  for (let h = 1; h <= numHoles; h++) {
    const el  = document.getElementById('h' + h + '-par');
    const dot = document.getElementById('dot-' + h);
    if (!el || !dot) continue;
    const p = parseInt(el.value);
    const ok = p >= 3 && p <= 6;
    dot.className = 'dot' + (ok ? ' filled' : '');
    // Highlight input border when filled
    el.classList.toggle('par-filled', ok);
  }
}

function scrollToHole(h) {
  const card = document.getElementById('hcard-' + h);
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Save Course ────────────────────────────────────────
// ── EDIT MODE STATE ───────────────────────────────────
let editingId = null;   // null = add new; set to course.id when editing

// ── Address title-case (Canada Post word order, on-the-fly) ──
const ADDR_UPPER = new Set(['BC','AB','SK','MB','ON','QC','NB','NS','PE','NL','NT','YT','NU',
                             'PO','NE','NW','SE','SW','N','S','E','W']);
function toAddrCase(str) {
  return str.replace(/[A-Za-z]+/g, w =>
    ADDR_UPPER.has(w.toUpperCase()) ? w.toUpperCase()
      : w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()
  );
}

// ── Tee display helpers ───────────────────────────────
const TEE_EXCLUDE_SOLO = ['black', 'silver', 'green'];

function toTitleCase(str) {
  // Converts BLUE → Blue, WHITE/BLUE → White/Blue, etc.
  return str.replace(/[A-Za-z]+/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
}

function filterDisplayTees(teeNames) {
  // Remove solo tees we never play (Black, Silver, standalone Green)
  const filtered = teeNames.filter(name => {
    const low = name.toLowerCase();
    // Keep combined tees (contain /) regardless
    if (low.includes('/')) return true;
    return !TEE_EXCLUDE_SOLO.includes(low);
  });
  // Keep at most 3 shortest (arrays run longest → shortest, so slice from end)
  return filtered.length > 3 ? filtered.slice(-3) : filtered;
}

// ── One-time: purge Tobiano from cache ────────────────
function purgeTobiano() {
  const c = getCache();
  const before = Object.keys(c).length;
  Object.keys(c).forEach(k => {
    if ((c[k].club_name || '').toLowerCase().includes('tobiano')) delete c[k];
  });
  if (Object.keys(c).length !== before) localStorage.setItem('courseCache', JSON.stringify(c));
}

// ── Safe sync from courses.json ──
// Only adds courses missing from cache and fills in missing phone numbers.
// Never overwrites existing course data — user edits are preserved.
async function syncPhones() {
  try {
    const resp = await fetch('courses.json');
    if (!resp.ok) return;
    const data = await resp.json();
    const cache = getCache();
    let changed = false;
    Object.entries(data).forEach(([k, src]) => {
      if (k === '_meta' || !src || !src.id) return;
      const key = String(src.id);
      if (!cache[key]) {
        // Course not in cache — seed it fresh
        cache[key] = { ...src, cachedAt: new Date().toISOString().split('T')[0] };
        changed = true;
      } else if (src.phone && !cache[key].phone) {
        // Fill in missing phone only
        cache[key].phone = src.phone;
        changed = true;
      }
    });
    if (changed) {
      localStorage.setItem('courseCache', JSON.stringify(cache));
      renderLibrary();
    }
  } catch(e) {}
}

// ── SCREEN 0: LIBRARY ─────────────────────────────────
function renderLibrary() {
  const cache   = getCache();
  const courses = Object.values(cache)
    .filter(c => c.club_name)
    .sort((a, b) => (a.club_name || '').localeCompare(b.club_name || ''));
  const el = document.getElementById('lib-list');
  if (!el) return;

  if (!courses.length) {
    el.innerHTML = '<div class="lib-empty">No courses yet — tap Add Course.</div>';
    return;
  }

  el.innerHTML = courses.map(c => {
    // Show hole count as subtitle; no tee chips (colours inconsistent across courses)
    const maleTees  = (c.tees || {}).male || [];
    const holeCount = maleTees[0] ? (maleTees[0].number_of_holes || 18) : 18;
    const meta = holeCount + ' holes';
    const phoneHtml = c.phone
      ? `<div class="lib-phone"><a href="tel:${esc(c.phone)}">${esc(c.phone)}</a></div>` : '';
    const isUserAdded = Number(c.id) < 0;
    const delBtn = isUserAdded
      ? `<button class="lib-del" onclick="deleteCourse('${c.id}')" title="Delete">✕</button>` : '';
    return `<div class="lib-item">
      <div class="lib-info" onclick="selectCourse('${c.id}')">
        <div class="lib-name">${esc(c.club_name)}</div>
        <div class="lib-sub">${esc(meta)}</div>
        ${phoneHtml}
      </div>
      <div class="lib-actions">
        <button class="lib-edit" onclick="editCourse('${c.id}')" title="Edit">✏️</button>
        ${delBtn}
      </div>
    </div>`;
  }).join('');
}

function startAddCourse() {
  editingId  = null;
  holeState  = {}; // clear any previous hole data
  // Reset form to blank
  document.getElementById('course-name').value     = '';
  document.getElementById('course-phone').value    = '';
  document.getElementById('course-street').value   = '';
  document.getElementById('course-city').value     = '';
  document.getElementById('course-province').value = 'BC';
  teesState.forEach(t => { t.cr = ''; t.sr = ''; });
  selectedTeeScreen1 = 'Blue';
  setHoles(18);
  renderTeeChips();
  renderTeeDetails();
  setEditMode(false);
  showScreen('basics');
}

function editCourse(id) {
  const cache  = getCache();
  const course = cache[id];
  if (!course) { alert('Course not found.'); return; }
  holeState = {}; // fresh edit — clear any leftover hole data

  editingId = course.id;

  // Pre-fill Screen 1
  document.getElementById('course-name').value     = course.club_name || '';
  document.getElementById('course-phone').value    = course.phone || '';
  const loc = course.location || {};
  document.getElementById('course-street').value   = toAddrCase(loc.address  || '');
  document.getElementById('course-city').value     = toAddrCase(loc.city     || '');
  document.getElementById('course-province').value = (loc.state || 'BC').toUpperCase();

  const maleTees = (course.tees || {}).male || [];
  const firstTee = maleTees[0];
  const holes    = firstTee ? (firstTee.number_of_holes || (firstTee.holes || []).length || 18) : 18;
  setHoles(holes);

  // Load saved tee data into teesState
  const savedTeeNames = maleTees.map(t => t.tee_name);
  teesState.forEach(t => {
    const match = maleTees.find(m => m.tee_name === t.name);
    t.cr = match ? String(match.course_rating || '') : '';
    t.sr = match ? String(match.slope_rating  || '') : '';
  });
  // Select the first saved tee (in standard order) for editing
  const firstSaved = TEE_ORDER.find(name => savedTeeNames.includes(name));
  selectedTeeScreen1 = firstSaved || savedTeeNames[0] || 'Blue';
  renderTeeChips();
  renderTeeDetails();

  setEditMode(true, course.club_name);
  showScreen('basics');
}

function setEditMode(on, courseName) {
  const title = document.getElementById('basics-title');
  const badge = document.getElementById('edit-badge');
  const stage = document.getElementById('basics-stage');
  const bc    = document.querySelector('#screen-basics .hu-breadcrumb');
  if (title) title.textContent = on ? (courseName || 'Edit Course') : 'Add Course';
  if (badge) badge.textContent = '';   // badge retired — breadcrumb carries context
  if (stage) stage.classList.toggle('edit-mode', on);
  if (bc)    bc.textContent = on ? 'Courses: Edit' : 'Courses: Add';
}

function applyFieldAsterisks() {
  // Mark CR/SR labels with a red asterisk if the selected tee's values are empty
  const t = teesState.find(t => t.name === selectedTeeScreen1);
  if (!t) return;
  const crEl  = document.getElementById('cr-' + t.name);
  const srEl  = document.getElementById('sr-' + t.name);
  const crLbl = document.getElementById('lbl-cr-' + t.name);
  const srLbl = document.getElementById('lbl-sr-' + t.name);
  if (crLbl) {
    const star = crLbl.querySelector('.req-star');
    if (star) star.remove();
    if (!crEl || !parseFloat(crEl.value))
      crLbl.insertAdjacentHTML('beforeend', '<span class="req-star">*</span>');
  }
  if (srLbl) {
    const star = srLbl.querySelector('.req-star');
    if (star) star.remove();
    if (!srEl || !parseInt(srEl.value))
      srLbl.insertAdjacentHTML('beforeend', '<span class="req-star">*</span>');
  }
}

function prefillHoleCards(course) {
  // Populate holeState from all tees in the saved course, then display active tee.
  const allTees = (course.tees || {}).male || (course.tees || {}).all || [];
  if (!allTees.length) return;

  // Use first tee's holes array for par/SI (shared across tees)
  const firstTee = allTees[0];
  const holeData = firstTee.holes || [];

  holeData.forEach((h, i) => {
    const hNum = i + 1;
    if (!holeState[hNum]) holeState[hNum] = { par: '', si: '', yds: {} };
    holeState[hNum].par = String(h.par   || '');
    holeState[hNum].si  = String(h.index || '');
    if (!holeState[hNum].yds) holeState[hNum].yds = {};

    // Yardage for each tee → stored by tee_name in holeState
    allTees.forEach(t => {
      const tName = t.tee_name;
      const yds   = t.holes && t.holes[i] ? (t.holes[i].yardage || '') : '';
      holeState[hNum].yds[tName] = String(yds);
    });
  });

  // Restore par/SI to DOM and load active tee's yardages
  prefillHoleCardsFromState();
}

function saveCourse() {
  // Flush whatever is currently visible on Screen 2 into holeState before reading it
  saveYardagesToState();
  saveParSiToState();
  syncTeeInputsToState(); // ensure CR/SR are current before reading teesState

  const name = document.getElementById('course-name').value.trim();
  if (!name) { alert('Course name is required.'); return; }

  const active = teesWithData();
  if (!active.length) { alert('Please enter CR or SR data for at least one tee before saving.'); return; }

  // Count holes with par filled (read from holeState — DOM may not exist)
  let parFilled = 0;
  for (let h = 1; h <= numHoles; h++) {
    const p = parseInt((holeState[h] || {}).par || '');
    if (p >= 3 && p <= 6) parFilled++;
  }
  if (parFilled < numHoles) {
    const missing = numHoles - parFilled;
    if (!confirm(`${missing} hole${missing > 1 ? 's are' : ' is'} missing a par value. Save anyway?`)) return;
  }

  // Build tee objects — all data read from holeState (source of truth)
  const allTeeObjs = [];

  active.forEach(t => {
    const holes = [];
    let totalPar = 0, totalYards = 0;

    for (let h = 1; h <= numHoles; h++) {
      const hs    = holeState[h] || {};
      const par   = parseInt(hs.par || '') || 4;
      const yards = parseInt((hs.yds && hs.yds[t.name]) || '') || 0;
      const si    = parseInt(hs.si  || '') || null;
      holes.push({ par, yardage: yards, index: si });
      totalPar   += par;
      totalYards += yards;
    }

    allTeeObjs.push({
      tee_name:        t.name,
      course_rating:   parseFloat(t.cr) || null,
      slope_rating:    parseInt(t.sr)   || null,
      number_of_holes: numHoles,
      par_total:       totalPar,
      total_yards:     totalYards,
      holes
    });
  });

  // Sort tees longest → shortest by total yardage
  allTeeObjs.sort((a, b) => b.total_yards - a.total_yards);

  // Edit mode: overwrite existing; add mode: assign new negative ID
  const cache  = getCache();
  let newId;
  if (editingId !== null) {
    newId = editingId;
  } else {
    const negIds = Object.keys(cache).map(Number).filter(n => n < 0);
    newId = negIds.length ? Math.min(...negIds) - 1 : -1;
  }

  // Merge tees: preserve existing tees that weren't edited this session,
  // so saving only Red tees doesn't wipe Blue tee data from a prior save.
  const existingMale = ((cache[String(newId)] || {}).tees || {}).male || [];
  const editedNames  = new Set(allTeeObjs.map(t => t.tee_name));
  const keptTees     = existingMale.filter(t => !editedNames.has(t.tee_name));
  const mergedMale   = [...allTeeObjs, ...keptTees]
    .sort((a, b) => (b.total_yards || 0) - (a.total_yards || 0));

  const phone    = formatPhone((document.getElementById('course-phone').value || '').trim());
  const street   = (document.getElementById('course-street').value   || '').trim();
  const city     = (document.getElementById('course-city').value     || '').trim();
  const province = (document.getElementById('course-province').value || 'BC').trim().toUpperCase();

  const course = {
    id:          newId,
    club_name:   name,
    course_name: name,
    phone:       phone  || undefined,
    location: {
      address: street   || undefined,
      city:    city     || '',
      state:   province || 'BC',
      country: 'Canada'
    },
    tees:        { male: mergedMale, female: [] }
  };

  saveToCache(course);
  editingId = null;
  setEditMode(false);
  renderLibrary();
  showScreen('library');
}

// ── Saved Courses List ─────────────────────────────────
function renderSavedList() {
  const cache   = getCache();
  const manual  = Object.values(cache).filter(c => Number(c.id) < 0);
  const savedEl = document.getElementById('saved-list');

  if (!manual.length) {
    savedEl.innerHTML = '<div class="empty-msg">No courses added yet.</div>';
    return;
  }

  savedEl.innerHTML = manual.map(c => {
    const allTees = [
      ...((c.tees || {}).male   || []).map(t => t.tee_name),
      ...((c.tees || {}).female || []).map(t => t.tee_name)
    ].join(', ');
    const firstTee = ((c.tees || {}).male || (c.tees || {}).female || [])[0];
    const holesStr = firstTee ? firstTee.number_of_holes + ' holes' : '';
    const phoneStr = c.phone ? ` · <a href="tel:${esc(c.phone)}" style="color:var(--green);text-decoration:none">${esc(c.phone)}</a>` : '';
    return `
      <div class="saved-item">
        <div>
          <div class="saved-name">${esc(c.club_name)}</div>
          <div class="saved-sub">${esc(allTees)}${holesStr ? ' · ' + holesStr : ''}${phoneStr}</div>
        </div>
        <button class="del-btn" onclick="deleteCourse(${c.id})" title="Delete">✕</button>
      </div>`;
  }).join('');
}


// Returns true if a tee has CR, SR, and every hole has par, yardage > 0, and SI.
function teeIsComplete(teeBox) {
  if (!teeBox.course_rating || !teeBox.slope_rating) return false;
  const holes = teeBox.holes || [];
  if (!holes.length) return false;
  return holes.every(h => h.par >= 3 && (h.yardage || 0) > 0 && h.index != null);
}

function selectCourse(id) {
  const course = getCache()[String(id)];
  if (!course) return;

  // Pick first complete mens tee; fall back to first available
  const maleTees = (course.tees || {}).male || [];
  const tee = maleTees.find(t => teeIsComplete(t)) || maleTees[0];
  if (!tee) { alert('No tee data for this course — edit it first.'); return; }

  const holes = (tee.holes || []).slice(0, Math.min(tee.number_of_holes || 18, 18))
    .map(h => ({ par: h.par, yards: h.yardage || 0, index: h.index || null }));
  const label = (!course.course_name || course.course_name === course.club_name)
    ? course.club_name
    : course.club_name + ' – ' + course.course_name;

  const activeCourse = {
    name:     label,
    par:      tee.par_total || holes.reduce((a, h) => a + h.par, 0),
    holes:    holes,
    cr:       tee.course_rating || '',
    sr:       tee.slope_rating  || '',
    teeName:  tee.tee_name      || '',
    gender:   'male',
    looped:   false,
    apiId:    course.id
  };
  localStorage.setItem('activeCourse', JSON.stringify(activeCourse));
  window.location.href = 'index.html';
}
function deleteCourse(id) {
  const cache = getCache();
  const name = (cache[id] || {}).club_name || 'this course';
  if (!confirm('Delete ' + name + '? The rounds you played there are safe in your scoresheet.')) return;
  removeFromCache(id);
  renderLibrary();
}

// ── Init ───────────────────────────────────────────────
(function init() {
  purgeTobiano();
  const today = new Date().toLocaleDateString('en-CA', {
    weekday: 'short', month: 'short', day: 'numeric'
  });
  document.getElementById('basics-date').textContent = today;
  document.getElementById('holes-date').textContent  = today;
  document.getElementById('lib-date').textContent    = today;
  renderTeeChips();
  renderTeeDetails();
  renderLibrary();
  syncPhones(); // async — updates cache then re-renders if phones were missing
})();
</script>
<script>
// Self-contained export — no shared.js dependency.
// Saves courseCache as a downloadable JSON file.
function exportCourses() {
  try {
    var data = localStorage.getItem('courseCache') || '{}';
    var count = Object.keys(JSON.parse(data)).length;
    if (count === 0) { alert('No course data found to export.'); return; }
    var blob = new Blob([data], { type: 'application/json' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href     = url;
    a.download = 'golf-courses-backup-' + new Date().toISOString().split('T')[0] + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch(e) {
    alert('Export failed: ' + e.message);
  }
}
</script>
