<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Set Sheets URL</title>
<style>body{font-family:sans-serif;padding:40px 24px;text-align:center;background:#f5f5f5;}
h2{color:#377f09;}p{color:#555;line-height:1.6;}</style>
</head>
<body>
<h2 id="msg">Setting up…</h2>
<p id="detail"></p>
<script>
const URL_TO_SET = "https://script.google.com/macros/s/AKfycbySPqhl4-gdbq2yykCaUKh3shzQGDY0xjz--0WV5GX0Tkad2huG9IA3_blQVFBKloSpUg/exec";
try {
  const p = JSON.parse(localStorage.getItem('profile') || '{}');
  p.sheetsUrl = URL_TO_SET;
  localStorage.setItem('profile', JSON.stringify(p));
  document.getElementById('msg').textContent = '✅ Done!';
  document.getElementById('detail').innerHTML = 'Google Sheets URL saved.<br><br><a href="/">Go back to the app →</a>';
} catch(e) {
  document.getElementById('msg').textContent = '❌ Error';
  document.getElementById('detail').textContent = e.message;
}
</script>
</body>
</html>
