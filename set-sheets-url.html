<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Restore Profile</title>
<style>body{font-family:sans-serif;padding:40px 24px;text-align:center;background:#f5f5f5;}
h2{color:#377f09;}p{color:#555;line-height:1.6;}</style>
</head>
<body>
<h2 id="msg">Restoring…</h2>
<p id="detail"></p>
<script>
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbySPqhl4-gdbq2yykCaUKh3shzQGDY0xjz--0WV5GX0Tkad2huG9IA3_blQVFBKloSpUg/exec";
try {
  // Restore full profile
  const profile = {
    name:           "Paul",
    reportEmail:    "kamloopspaul@gmail.com",
    hi:             20,
    homeTees:       "mensBlue",
    homeCourse:     "mt. paul",
    sheetsUrl:      SHEETS_URL,
    setupComplete:  true,
    recordStats:    true,
    statFIR:        true,
    statGIR:        true,
    statPEN:        true,
    statUD:         true,
    statXUD:        true,
    statPUTTS:      true,
    statGPI:        true,
    statPCC:        true,
    receiveReports: true,
    reportFreq:     5
  };
  localStorage.setItem('profile', JSON.stringify(profile));
  document.getElementById('msg').textContent = '✅ Profile restored!';
  document.getElementById('detail').innerHTML = 'Your profile and Sheets URL have been saved.<br><br><a href="/">Go back to the app →</a>';
} catch(e) {
  document.getElementById('msg').textContent = '❌ Error';
  document.getElementById('detail').textContent = e.message;
}
</script>
</body>
</html>
